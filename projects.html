<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="projects.title">Projects</title>
    <link rel="stylesheet" href="./styles/main.css" />
</head>

<body>
    <!-- Navbar -->
    <header class="navbar">
        <nav>
            <ul>
                <li><a href="./index.html" data-i18n="navbar.home"></a></li>
                <li><a href="./about.html" data-i18n="navbar.about"></a></li>
                <li><a href="./projects.html" data-i18n="navbar.projects"></a></li>
                <li><a href="#contact" data-i18n="navbar.contact"></a></li>
            </ul>
        </nav>
    </header>

    <!-- Projects Section -->
    <section class="projects">
        <h2 data-i18n="projects.title">Projects</h2>
        <div class="project-list">
            <!-- Example card -->
            <div class="card">
                <img src="./assets/images/project-placeholder.png" alt="Project preview" />
                <div class="card-body">
                    <h3 class="card-title" data-i18n="project.title">Project Title</h3>
                    <p class="card-text" data-i18n="project.description">Project description goes here.</p>
                    <div class="card-actions">
                        <a href="#" class="btn" data-i18n="project.view">View Project</a>
                        <a href="#" class="btn btn-github">GitHub</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Biel Vereda</p>
    </footer>

    <!-- Settings Panel -->
    <div class="settings-panel">
        <h3 data-i18n="settings.title">Settings</h3>
        <!-- same config panel as index -->
    </div>

    <script src="./scripts/main.js"></script>
    <script src="./scripts/theme.js"></script>
    <script src="./scripts/animations.js"></script>
</body>

</html>
