<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="project.title">Project Card</title>
    <link rel="stylesheet" href="../styles/main.css" />
</head>

<body>
    <div class="card">
        <img src="../assets/images/project-placeholder.png" alt="Project preview" class="card-img-top" />
        <div class="card-body">
            <h3 class="card-title" data-i18n="project.title">Project Title</h3>
            <p class="card-text" data-i18n="project.description">Project description goes here.</p>
            <div class="card-actions">
                <a href="#" class="btn" data-i18n="project.view">View Project</a>
                <a href="#" class="btn btn-github">GitHub</a>
            </div>
        </div>
    </div>
</body>

</html>
